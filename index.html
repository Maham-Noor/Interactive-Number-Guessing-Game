<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- Include Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="game-container" id="game-card">
        <h1>Guess IT!</h1>
        <p>Thinking of a number between <strong>1 and 100</strong>.</p>
        
        <div class="stats">
            Attempts Left: <span id="attempts-left">10</span>
        </div>

        <div class="input-group">
            <input type="number" id="guess-input" placeholder="??" min="1" max="100">
            <button id="submit-btn">GUESS</button>
        </div>

        <div id="feedback-msg"></div>

        <button id="restart-btn">PLAY AGAIN</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
